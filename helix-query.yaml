version: 1

indices:
  blog:
    include:
      - '/blogs/news/**'
    exclude:
      - '/blogs/news'
    target: /blogs/news/query-index.json
    properties:
      title:
        select: head > meta[property="og:title"]
        value: attribute(el, 'content')
      image:
        select: head > meta[property="og:image"]
        value: attribute(el, 'content')
      description:
        select: head > meta[name="description"]
        value: attribute(el, 'content')
      publishdate:
        select: head > meta[name="publishdate"]
        value: attribute(el, 'content')
      category:
        select: head > meta[name="category"]
        value: attribute(el, 'content')
      lastModified:
        select: none
        value: parseTimestamp(headers('last-modified'), 'ddd, DD MMM YYYY hh:mm:ss GMT')

  products:
    include:
      - '/products/**'
    target: /products/query-index.json
    properties:
      title:
        select: head > meta[property="og:title"]
        value: attribute(el, 'content')
      image:
        select: head > meta[property="og:image"]
        value: attribute(el, 'content')
      description:
        select: head > meta[name="description"]
        value: attribute(el, 'content')
      category:
        select: head > meta[name="category"]
        value: attribute(el, 'content')
      credittype:
        select: head > meta[name="credittype"]
        value: attribute(el, 'content')

  default:
    include:
      - '/pages/**'
      - '/collections/**'
    target: /query-index.json
    properties:
      title:
        select: head > meta[property="og:title"]
        value: attribute(el, 'content')
      image:
        select: head > meta[property="og:image"]
        value: attribute(el, 'content')
      description:
        select: head > meta[name="description"]
        value: attribute(el, 'content')
